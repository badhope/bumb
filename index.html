<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核武器模拟器</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>
<body>
    <div id="map"></div>

    <div class="floating-header">
        <h1>☢️ 核武器模拟器</h1>
        <span class="header-warning">⚠️ 仅供教育研究</span>
    </div>

    <div class="tool-btn" id="settingsBtn" onclick="toggleTool('settings')" title="参数设置">
        ⚙️
    </div>

    <div class="tool-btn target-btn" id="targetBtn" onclick="toggleTool('target')" title="目标定位">
        🎯
    </div>

    <div class="tool-btn" id="resultsBtn" onclick="toggleTool('results')" title="模拟结果">
        📊
    </div>

    <div class="tool-btn fire-btn" id="fireBtn" onclick="triggerExplosion()" title="引爆">
        💥
    </div>

    <div class="tool-panel" id="settingsPanel">
        <div class="panel-header">
            <span>⚙️ 参数设置</span>
            <span class="close-btn" onclick="toggleTool('settings')">✕</span>
        </div>
        <div class="panel-body">
            <div class="form-group">
                <label>武器类型</label>
                <select id="weaponType">
                    <option value="littleBoy">小男孩 (15kt)</option>
                    <option value="fatMan">胖子 (21kt)</option>
                    <option value="w76">W76 (100kt)</option>
                    <option value="trident">三叉戟II (100kt)</option>
                    <option value="w87">W87 (300kt)</option>
                    <option value="df41">东风-41 (300kt)</option>
                    <option value="bulava">布拉瓦 (150kt)</option>
                    <option value="b83">B83 (1.2Mt)</option>
                    <option value="tsar">沙皇炸弹 (50Mt)</option>
                    <option value="custom">自定义</option>
                </select>
            </div>
            <div class="form-group" id="customYieldGroup" style="display:none;">
                <label>当量 (kt)</label>
                <input type="number" id="customYield" min="1" max="100000" value="100">
            </div>
            <div class="form-group">
                <label>爆炸高度</label>
                <select id="burstHeight">
                    <option value="surface">地面爆炸</option>
                    <option value="air" selected>空中爆炸</option>
                    <option value="high">高空爆炸</option>
                </select>
            </div>
            <div class="form-group">
                <label>人口密度 (人/km²)</label>
                <input type="number" id="population" min="1" max="100000" value="5000">
            </div>
            <div class="form-group">
                <label>时间段</label>
                <select id="timeOfDay">
                    <option value="night">夜间</option>
                    <option value="day" selected>白天</option>
                    <option value="rush">高峰时段</option>
                </select>
            </div>
        </div>
    </div>

    <div class="tool-panel target-panel" id="targetPanel">
        <div class="panel-header">
            <span>🎯 目标定位</span>
            <span class="close-btn" onclick="toggleTool('target')">✕</span>
        </div>
        <div class="panel-body">
            <div class="form-group">
                <label>搜索城市</label>
                <input type="text" id="searchCity" placeholder="输入城市名..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="form-group">
                <label>城市列表</label>
                <select id="citySelect">
                    <option value="">-- 选择城市 --</option>
                </select>
            </div>
            <div class="coord-display">
                <div class="coord-row">
                    <span class="coord-label">📍 目标坐标</span>
                </div>
                <div class="coord-row">
                    <span>纬度:</span>
                    <span id="targetLat">-</span>
                </div>
                <div class="coord-row">
                    <span>经度:</span>
                    <span id="targetLng">-</span>
                </div>
                <div class="coord-row">
                    <span>位置:</span>
                    <span id="targetName">-</span>
                </div>
            </div>
            <div class="hint-text">💡 点击地图选择目标位置</div>
        </div>
    </div>

    <div class="tool-panel results-panel" id="resultsPanel">
        <div class="panel-header">
            <span>📊 模拟结果</span>
            <span class="close-btn" onclick="toggleTool('results')">✕</span>
        </div>
        <div class="panel-body">
            <div class="result-grid">
                <div class="result-item">
                    <span class="result-label">火球半径</span>
                    <span class="result-value" id="fireballRadius">-</span>
                    <span class="result-unit">km</span>
                </div>
                <div class="result-item">
                    <span class="result-label">重度破坏</span>
                    <span class="result-value" id="heavyBlastRadius">-</span>
                    <span class="result-unit">km</span>
                </div>
                <div class="result-item">
                    <span class="result-label">中度破坏</span>
                    <span class="result-value" id="moderateBlastRadius">-</span>
                    <span class="result-unit">km</span>
                </div>
                <div class="result-item">
                    <span class="result-label">热辐射</span>
                    <span class="result-value" id="thermalRadius">-</span>
                    <span class="result-unit">km</span>
                </div>
            </div>
            <div class="casualty-section">
                <div class="casualty-item death">
                    <span class="casualty-label">💀 死亡人数</span>
                    <span class="casualty-value" id="deaths">-</span>
                </div>
                <div class="casualty-item injury">
                    <span class="casualty-label">🤕 受伤人数</span>
                    <span class="casualty-value" id="injuries">-</span>
                </div>
            </div>
            <div class="extra-info">
                <div class="info-row"><span>有效密度:</span><span id="effectiveDensity">-</span></div>
                <div class="info-row"><span>经济损失:</span><span id="economicLoss">-</span></div>
                <div class="info-row"><span>恢复时间:</span><span id="recoveryTime">-</span></div>
            </div>
        </div>
    </div>

    <div class="coord-toast" id="coordToast">
        <span id="toastLat">-</span>, <span id="toastLng">-</span>
    </div>

    <div class="map-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#ff0000"></span>火球</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ff4500"></span>重度</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ff8c00"></span>中度</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ffd700"></span>轻度</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ff6347"></span>热辐射</div>
    </div>

    <div class="explosion-overlay" id="explosionOverlay">
        <div class="explosion-flash"></div>
        <div class="explosion-ring"></div>
        <div class="shockwave"></div>
        <div class="explosion-particles" id="explosionParticles"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></div>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script>
        function toggleTool(tool) {
            const panels = {
                settings: 'settingsPanel',
                target: 'targetPanel',
                results: 'resultsPanel'
            };
            
            const btns = {
                settings: 'settingsBtn',
                target: 'targetBtn',
                results: 'resultsBtn'
            };

            const panel = document.getElementById(panels[tool]);
            const btn = document.getElementById(btns[tool]);
            
            if (panel.classList.contains('show')) {
                panel.classList.remove('show');
                btn.classList.remove('active');
            } else {
                Object.values(panels).forEach(p => {
                    document.getElementById(p).classList.remove('show');
                });
                Object.values(btns).forEach(b => {
                    document.getElementById(b).classList.remove('active');
                });
                panel.classList.add('show');
                btn.classList.add('active');
            }
        }

        function triggerExplosion() {
            const lat = document.getElementById('targetLat').textContent;
            const lng = document.getElementById('targetLng').textContent;
            
            if (lat === '-' || lng === '-') {
                alert('请先选择目标位置！');
                return;
            }
            
            playExplosionEffect();
            
            if (typeof App !== 'undefined') {
                App.runSimulation();
            }
            
            const fireBtn = document.getElementById('fireBtn');
            fireBtn.classList.add('firing');
            setTimeout(() => fireBtn.classList.remove('firing'), 1000);
        }

        function playExplosionEffect() {
            const overlay = document.getElementById('explosionOverlay');
            const particlesContainer = document.getElementById('explosionParticles');
            
            overlay.style.opacity = '1';
            
            particlesContainer.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const angle = (Math.random() * 360) * (Math.PI / 180);
                const distance = 100 + Math.random() * 300;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                const delay = Math.random() * 0.3;
                const duration = 1.5 + Math.random() * 1;
                
                particle.style.cssText = `
                    left: 50%;
                    top: 50%;
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                    --tx: ${x}px;
                    --ty: ${y}px;
                `;
                particle.style.animation = `particle-fly-custom ${duration}s ease-out ${delay}s forwards`;
                particlesContainer.appendChild(particle);
            }
            
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 3000);
        }

        function updateTargetCoords(lat, lng, name) {
            document.getElementById('targetLat').textContent = lat.toFixed(4);
            document.getElementById('targetLng').textContent = lng.toFixed(4);
            document.getElementById('targetName').textContent = name || '自定义位置';
            
            const toast = document.getElementById('coordToast');
            document.getElementById('toastLat').textContent = lat.toFixed(4);
            document.getElementById('toastLng').textContent = lng.toFixed(4);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        window.updateTargetCoords = updateTargetCoords;
    </script>
    <script src="country-data.js"></script>
    <script src="cities.js"></script>
    <script src="nuclear.js"></script>
    <script src="map.js"></script>
    <script src="app.js"></script>
</body>
</html>
